name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        uses: astral-sh/ruff-action@v3

      - name: Test with pytest (fast)
        run: python -m pytest tests/ -v -m "not smoke" --cov=sources --cov-report=term --cov-fail-under=50

      - name: Smoke test (rete, solo su main)
        if: github.ref == 'refs/heads/main'
        run: python -m pytest tests/ -v -m "smoke" --cov=sources --cov-report=term
